name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
  workflow_dispatch:

# A newer push to the same branch supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Unit tests · Build
    runs-on: ubuntu-latest
    env:
      # Dummy values only — they exist to satisfy validateEnv() at module load.
      # Nothing in this job touches the network.
      AIRTABLE_API_KEY: ci-dummy-key
      AIRTABLE_BASE_ID: appCIdummyBaseId0
      SESSION_SECRET: ci-dummy-session-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build

  schema-contract:
    name: Airtable schema contract
    runs-on: ubuntu-latest
    # Skips itself (inside the test) when Airtable secrets aren't configured, so forks
    # and secret-less PRs don't fail.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check fieldMap ids, select choices and writable fields against the live base
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          SESSION_SECRET: ci-dummy-session-secret-at-least-32-characters
        run: npm run test:contract
